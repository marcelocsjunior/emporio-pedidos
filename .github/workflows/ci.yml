name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - name: Test MVP-03 operational flow
        run: pytest -q orders/tests/test_mvp03.py --tb=line --disable-warnings
      - name: Test existing domain and GUI
        run: pytest -q orders/tests/test_domain.py orders/tests/test_gui.py --tb=line --disable-warnings
      - name: Test customer portal flow
        run: |
          set -o pipefail
          pytest -q customer_portal/tests --tb=line --disable-warnings 2>&1 | tee portal-test-output.txt
      - name: Preserve portal test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-test-output
          path: portal-test-output.txt
          if-no-files-found: ignore
      - name: Test remaining suite
        run: |
          set -o pipefail
          pytest -q --ignore=orders/tests/test_mvp03.py --ignore=orders/tests/test_domain.py --ignore=orders/tests/test_gui.py --ignore=customer_portal/tests --tb=line --disable-warnings 2>&1 | tee remaining-test-output.txt
      - name: Preserve remaining test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remaining-test-output
          path: remaining-test-output.txt
          if-no-files-found: ignore
      - name: Ruff full gate
        run: |
          set -o pipefail
          ruff check . 2>&1 | tee ruff-output.txt
      - name: Preserve Ruff evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt
          if-no-files-found: ignore

  deployment-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Validate deployment package
        run: |
          pytest -q tests/test_deployment_package.py
          bash -n ops/vps-*.sh
          test "$(find ops -maxdepth 1 -name 'vps-*.sh' ! -perm -u+x | wc -l)" -eq 0
      - name: Prepare synthetic environment
        run: |
          cp deploy/env.vps.example .ci-vps.env
          sed -i 's/generate-a-new-random-secret/ci-only-not-a-production-secret-0123456789/' .ci-vps.env
          sed -i 's/generate-a-new-random-password/ci-only-postgres-password/' .ci-vps.env
          sed -i "s/set-by-deploy-script-to-authorized-sha/${GITHUB_SHA}/" .ci-vps.env
          chmod 600 .ci-vps.env
      - name: Compose config and image build
        env:
          APP_IMAGE_TAG: ${{ github.sha }}
          VPS_ENV_FILE: ${{ github.workspace }}/.ci-vps.env
          COMPOSE_PROJECT_NAME: emporio_pedidos_ci
          APP_PORT: "8850"
          DB_VOLUME_NAME: emporio_pedidos_ci_pgdata
        run: |
          docker compose -f deploy/docker-compose.vps.yml config --quiet
          docker compose -f deploy/docker-compose.vps.yml build web
      - name: Empty PostgreSQL smoke test
        env:
          APP_IMAGE_TAG: ${{ github.sha }}
          VPS_ENV_FILE: ${{ github.workspace }}/.ci-vps.env
          COMPOSE_PROJECT_NAME: emporio_pedidos_ci
          APP_PORT: "8850"
          DB_VOLUME_NAME: emporio_pedidos_ci_pgdata
        run: |
          docker compose -f deploy/docker-compose.vps.yml up -d --wait db
          docker compose -f deploy/docker-compose.vps.yml run --rm web python manage.py migrate --noinput
          docker compose -f deploy/docker-compose.vps.yml run --rm web python manage.py bootstrap_roles
          docker compose -f deploy/docker-compose.vps.yml up -d --no-build web worker
          for attempt in $(seq 1 30); do curl --fail --silent http://127.0.0.1:8850/health/ && break; sleep 2; done
          for check in $(seq 1 10); do curl --fail --silent http://127.0.0.1:8850/health/ >/dev/null; done
          curl --fail --silent http://127.0.0.1:8850/conta/entrar/ >/dev/null
          curl --fail --silent http://127.0.0.1:8850/static/css/app.css >/dev/null
          test "$(docker inspect --format '{{.RestartCount}}' emporio_pedidos_ci-web-1)" -eq 0
          test "$(docker inspect --format '{{.RestartCount}}' emporio_pedidos_ci-worker-1)" -eq 0
          docker compose -f deploy/docker-compose.vps.yml ps
      - name: Cleanup ephemeral deployment
        if: always()
        env:
          APP_IMAGE_TAG: ${{ github.sha }}
          VPS_ENV_FILE: ${{ github.workspace }}/.ci-vps.env
          COMPOSE_PROJECT_NAME: emporio_pedidos_ci
          APP_PORT: "8850"
          DB_VOLUME_NAME: emporio_pedidos_ci_pgdata
        run: docker compose -f deploy/docker-compose.vps.yml down --volumes --remove-orphans
