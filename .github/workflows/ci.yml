name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - name: Test MVP-03 operational flow
        run: pytest -q orders/tests/test_mvp03.py --tb=line --disable-warnings
      - name: Test existing domain and GUI
        run: pytest -q orders/tests/test_domain.py orders/tests/test_gui.py --tb=line --disable-warnings
      - name: Test remaining suite
        run: pytest -q --ignore=orders/tests/test_mvp03.py --ignore=orders/tests/test_domain.py --ignore=orders/tests/test_gui.py --tb=line --disable-warnings
      - name: Ruff forms
        continue-on-error: true
        run: ruff check orders/forms.py
      - name: Ruff services
        continue-on-error: true
        run: ruff check orders/services.py
      - name: Ruff views
        continue-on-error: true
        run: ruff check orders/views.py
      - name: Ruff tests
        continue-on-error: true
        run: ruff check orders/tests/test_domain.py orders/tests/test_gui.py orders/tests/test_mvp03.py
      - name: Ruff models
        continue-on-error: true
        run: ruff check orders/models.py
      - name: Ruff URLs
        continue-on-error: true
        run: ruff check orders/urls.py
      - name: Ruff roles
        continue-on-error: true
        run: ruff check accounts/roles.py
      - name: Ruff full gate
        run: ruff check .
