name: Ruff Autofix MVP-IA-01

on:
  push:
    branches:
      - agent/mvp-ia-01-central-inteligente

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mvp-ia-01-central-inteligente
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Apply Ruff safe fixes
        run: ruff check --fix .
      - name: Commit fixes when needed
        run: |
          if git diff --quiet; then
            echo "Nenhuma correção necessária."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: apply Ruff import ordering"
          git push origin HEAD:agent/mvp-ia-01-central-inteligente
